<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card green">
  <div class="eyebrow"><span class="lime-rule"></span>BUTTONS</div>
  <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
    <button style="font-family:'Aston Martin Flare',Georgia;font-style:normal;font-weight:700;font-size:13px;letter-spacing:0.12em;text-transform:uppercase;background:#CEDC00;color:#0A0F0E;border:none;padding:14px 22px;border-radius:4px;cursor:pointer;box-shadow:0 0 0 1px rgba(206,220,0,0.35),0 12px 40px -8px rgba(206,220,0,0.35)">Shop now</button>
    <button style="font-family:'Aston Martin Flare',Georgia;font-style:normal;font-weight:700;font-size:13px;letter-spacing:0.12em;text-transform:uppercase;background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.32);padding:13px 22px;border-radius:4px;cursor:pointer">Read more</button>
    <button style="font-family:'Aston Martin Flare',Georgia;font-style:normal;font-weight:700;font-size:13px;letter-spacing:0.12em;text-transform:uppercase;background:rgba(255,255,255,0.06);color:#fff;border:1px solid rgba(255,255,255,0.18);padding:13px 22px;border-radius:4px;cursor:pointer;backdrop-filter:blur(14px)">Discover →</button>
    <button style="font-family:'Aston Martin Flare',Georgia;font-style:normal;font-weight:700;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;background:transparent;color:#CEDC00;border:none;padding:13px 0;cursor:pointer;border-bottom:2px solid #CEDC00">Explore</button>
  </div>
  <div style="display:flex;gap:8px;align-items:center;margin-top:14px">
    <span style="font-family:'Inter';font-style:italic;font-weight:300;font-size:11px;letter-spacing:0.06em;color:rgba(255,255,255,0.55);text-transform:uppercase">Primary · Outline · Glass · Link</span>
  </div>
</div>
</body></html>
