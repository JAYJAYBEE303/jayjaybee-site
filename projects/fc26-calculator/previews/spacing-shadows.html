<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card green">
  <div class="eyebrow"><span class="lime-rule"></span>SHADOWS · GLASS · GLOW</div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px">
    <div>
      <div style="height:80px;background:#14201E;border:1px solid rgba(255,255,255,0.1);border-radius:8px;box-shadow:0 1px 0 rgba(255,255,255,0.04) inset, 0 1px 2px rgba(0,0,0,0.4)"></div>
      <div style="font-family:Inter;font-style:italic;font-size:11px;color:#fff;margin-top:8px">--shadow-1</div>
      <div style="font-family:Inter;font-style:italic;font-size:10px;color:rgba(255,255,255,0.5)">resting cards</div>
    </div>
    <div>
      <div style="height:80px;background:#14201E;border:1px solid rgba(255,255,255,0.1);border-radius:8px;box-shadow:0 1px 0 rgba(255,255,255,0.05) inset, 0 8px 24px -8px rgba(0,0,0,0.55)"></div>
      <div style="font-family:Inter;font-style:italic;font-size:11px;color:#fff;margin-top:8px">--shadow-2</div>
      <div style="font-family:Inter;font-style:italic;font-size:10px;color:rgba(255,255,255,0.5)">hover</div>
    </div>
    <div>
      <div style="height:80px;background:#14201E;border:1px solid rgba(255,255,255,0.1);border-radius:8px;box-shadow:0 1px 0 rgba(255,255,255,0.06) inset, 0 18px 48px -12px rgba(0,0,0,0.65)"></div>
      <div style="font-family:Inter;font-style:italic;font-size:11px;color:#fff;margin-top:8px">--shadow-3</div>
      <div style="font-family:Inter;font-style:italic;font-size:10px;color:rgba(255,255,255,0.5)">modal · drawer</div>
    </div>
    <div>
      <div style="height:80px;background:rgba(255,255,255,0.06);backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);border:1px solid rgba(255,255,255,0.18);border-radius:8px"></div>
      <div style="font-family:Inter;font-style:italic;font-size:11px;color:#fff;margin-top:8px">amf1-glass</div>
      <div style="font-family:Inter;font-style:italic;font-size:10px;color:rgba(255,255,255,0.5)">floating panel</div>
    </div>
    <div>
      <div style="height:80px;background:#CEDC00;border-radius:8px;box-shadow:0 0 0 1px rgba(206,220,0,0.35), 0 12px 40px -8px rgba(206,220,0,0.35)"></div>
      <div style="font-family:Inter;font-style:italic;font-size:11px;color:#fff;margin-top:8px">lime-glow</div>
      <div style="font-family:Inter;font-style:italic;font-size:10px;color:rgba(255,255,255,0.5)">primary CTA</div>
    </div>
    <div>
      <div style="height:80px;background:#00A39A;border-radius:8px;box-shadow:0 0 0 1px rgba(0,163,154,0.30), 0 12px 40px -8px rgba(0,163,154,0.40)"></div>
      <div style="font-family:Inter;font-style:italic;font-size:11px;color:#fff;margin-top:8px">teal-glow</div>
      <div style="font-family:Inter;font-style:italic;font-size:10px;color:rgba(255,255,255,0.5)">live · telemetry</div>
    </div>
  </div>
</div>
</body></html>
