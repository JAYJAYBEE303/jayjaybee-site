<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card green" style="padding:24px">
  <div class="eyebrow"><span class="lime-rule"></span>NEWS CARD</div>
  <div style="display:grid;grid-template-columns:200px 1fr;gap:18px;background:#14201E;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:14px;box-shadow:0 18px 48px -12px rgba(0,0,0,0.65)">
    <div style="aspect-ratio:1.2;background:linear-gradient(135deg,#001F1B,#00352F);border-radius:4px;display:flex;align-items:flex-end;padding:10px;position:relative;overflow:hidden">
      <div style="position:absolute;inset:0;background:radial-gradient(circle at 60% 70%,rgba(0,163,154,0.35),transparent 60%)"></div>
      <span style="position:relative;font-family:Inter;font-style:italic;font-weight:700;font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:#0A0F0E;background:#CEDC00;padding:3px 7px;border-radius:999px">FEATURE</span>
    </div>
    <div style="display:flex;flex-direction:column;justify-content:space-between">
      <div>
        <div style="font-family:Inter;font-style:italic;font-weight:700;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:#CEDC00;margin-bottom:8px">22 APR 2026 · SILVERSTONE</div>
        <h3 style="font-family:'Aston Martin Flare',Georgia;font-style:normal;font-weight:700;font-size:20px;color:#fff;text-transform:uppercase;line-height:1.05;margin:0">Inside the AMR26 — engineered for a fresh approach</h3>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
        <span style="font-family:'Aston Martin Sans',Inter;font-style:italic;font-weight:300;font-size:12px;color:rgba(255,255,255,0.5)">3 min read</span>
        <span style="font-family:Inter;font-style:italic;font-weight:700;font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:#CEDC00;border-bottom:1px solid #CEDC00">Read more</span>
      </div>
    </div>
  </div>
</div>
</body></html>
