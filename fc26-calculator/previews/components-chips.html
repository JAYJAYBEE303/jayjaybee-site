<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card green">
  <div class="eyebrow"><span class="lime-rule"></span>STATUS · CHIPS · TAGS</div>
  <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">
    <span style="display:inline-flex;align-items:center;gap:6px;font-family:Inter;font-style:italic;font-weight:700;font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:#fff;background:#FF3B30;padding:5px 10px;border-radius:999px"><span style="width:6px;height:6px;background:#fff;border-radius:50%;animation:p 1.2s infinite"></span>LIVE</span>
    <span style="font-family:Inter;font-style:italic;font-weight:700;font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:#0A0F0E;background:#CEDC00;padding:5px 10px;border-radius:999px">DROP</span>
    <span style="font-family:Inter;font-style:italic;font-weight:700;font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:#0A0F0E;background:#FFD200;padding:5px 10px;border-radius:999px">YELLOW</span>
    <span style="font-family:Inter;font-style:italic;font-weight:700;font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:#fff;background:rgba(0,163,154,0.2);border:1px solid #00A39A;padding:5px 10px;border-radius:999px">TELEMETRY</span>
    <span style="font-family:Inter;font-style:italic;font-weight:700;font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.7);background:transparent;border:1px solid rgba(255,255,255,0.18);padding:5px 10px;border-radius:999px">ANNOUNCEMENT</span>
    <span style="font-family:Inter;font-style:italic;font-weight:700;font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.7);background:transparent;border:1px solid rgba(255,255,255,0.18);padding:5px 10px;border-radius:999px">ESPORTS</span>
    <span style="font-family:Inter;font-style:italic;font-weight:700;font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.7);background:transparent;border:1px solid rgba(255,255,255,0.18);padding:5px 10px;border-radius:999px">FEATURE</span>
  </div>
  <div style="margin-top:14px;display:flex;gap:18px;align-items:center">
    <div style="font-family:'Aston Martin Flare',Georgia;font-style:normal;font-weight:800;font-size:32px;color:#fff;line-height:1">P5</div>
    <div style="font-family:'Aston Martin Flare',Georgia;font-style:normal;font-weight:800;font-size:32px;color:#CEDC00;line-height:1">+0.214s</div>
    <div style="font-family:'Aston Martin Flare',Georgia;font-style:normal;font-weight:800;font-size:32px;color:#00A39A;line-height:1">L42</div>
    <span style="font-family:Inter;font-style:italic;font-weight:300;font-size:11px;letter-spacing:0.06em;color:rgba(255,255,255,0.55);text-transform:uppercase">Stat tiles · tabular display Flare</span>
  </div>
</div>
<style>@keyframes p { 0%,100%{opacity:1}50%{opacity:0.3} }</style>
</body></html>
