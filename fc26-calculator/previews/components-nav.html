<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card onyx" style="padding:0;height:140px;position:relative;overflow:hidden">
  <!-- top nav -->
  <div style="position:absolute;inset:0;background:linear-gradient(180deg,#001F1B 0%,#00352F 100%)"></div>
  <div style="position:absolute;inset:0;background:rgba(0,0,0,0.2);backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);border-bottom:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;padding:0 24px;height:60px">
    <div style="display:flex;align-items:center;gap:10px">
      <svg width="36" height="18" viewBox="0 0 400 200"><path d="M30 100 Q90 70 200 100" stroke="#CEDC00" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M40 110 Q95 86 200 108" stroke="#CEDC00" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.85"/><path d="M50 118 Q100 100 200 116" stroke="#CEDC00" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/><path d="M370 100 Q310 70 200 100" stroke="#CEDC00" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M360 110 Q305 86 200 108" stroke="#CEDC00" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.85"/><path d="M350 118 Q300 100 200 116" stroke="#CEDC00" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/><rect x="178" y="88" width="44" height="44" rx="2" fill="#CEDC00"/></svg>
      <span style="font-family:'Aston Martin Flare',Georgia;font-style:normal;font-weight:800;font-size:14px;letter-spacing:0.06em;text-transform:uppercase;color:#fff">Aston Martin Aramco F1</span>
    </div>
    <div style="margin-left:36px;display:flex;gap:22px">
      <span style="font-family:Inter;font-style:italic;font-weight:700;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#CEDC00;border-bottom:2px solid #CEDC00;padding-bottom:4px">Team</span>
      <span style="font-family:Inter;font-style:italic;font-weight:700;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.7)">News</span>
      <span style="font-family:Inter;font-style:italic;font-weight:700;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.7)">Drivers</span>
      <span style="font-family:Inter;font-style:italic;font-weight:700;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.7)">Partners</span>
      <span style="font-family:Inter;font-style:italic;font-weight:700;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.7)">I / AM</span>
      <span style="font-family:Inter;font-style:italic;font-weight:700;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.7)">Shop</span>
    </div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
      <span style="display:inline-flex;align-items:center;gap:6px;font-family:Inter;font-style:italic;font-weight:700;font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:#fff;background:#FF3B30;padding:4px 8px;border-radius:999px"><span style="width:6px;height:6px;background:#fff;border-radius:50%"></span>LIVE</span>
      <span style="font-family:Inter;font-style:italic;font-size:11px;color:rgba(255,255,255,0.7)">FP1 · Miami · L24</span>
    </div>
  </div>
  <!-- below nav strip showing race ticker -->
  <div style="position:absolute;top:60px;left:0;right:0;height:80px;display:flex;align-items:center;padding:0 24px;background:rgba(0,0,0,0.4);border-bottom:1px solid rgba(255,255,255,0.06)">
    <div style="display:flex;gap:24px;align-items:center">
      <div><div style="font-family:Inter;font-style:italic;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.5)">P</div><div style="font-family:'Aston Martin Flare',Georgia;font-style:normal;font-weight:800;font-size:24px;color:#fff;line-height:1">5</div></div>
      <div><div style="font-family:Inter;font-style:italic;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.5)">DRIVER</div><div style="font-family:'Aston Martin Flare',Georgia;font-style:normal;font-weight:700;font-size:14px;color:#fff;line-height:1.3">F. ALONSO</div></div>
      <div><div style="font-family:Inter;font-style:italic;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.5)">GAP</div><div style="font-family:'Aston Martin Flare',Georgia;font-style:normal;font-weight:800;font-size:24px;color:#CEDC00;line-height:1">+0.214</div></div>
      <div><div style="font-family:Inter;font-style:italic;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.5)">LAST</div><div style="font-family:'Aston Martin Flare',Georgia;font-style:normal;font-weight:800;font-size:24px;color:#00A39A;line-height:1">1:29.482</div></div>
    </div>
  </div>
</div>
</body></html>
