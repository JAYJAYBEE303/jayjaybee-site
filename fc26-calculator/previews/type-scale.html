<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card green">
  <div class="eyebrow"><span class="lime-rule"></span>TYPE SCALE</div>
  <div style="display:grid;grid-template-columns:auto 1fr auto;gap:8px 18px;align-items:baseline">
    <span style="font-family:Inter;font-style:italic;font-size:10px;letter-spacing:0.16em;color:rgba(255,255,255,0.5);text-transform:uppercase">Display 1</span>
    <span style="font-family:'Aston Martin Flare',Georgia;font-style:normal;font-weight:800;font-size:48px;color:#fff;text-transform:uppercase;letter-spacing:-0.02em;line-height:1">AMF1</span>
    <span style="font-family:Inter;font-style:italic;font-size:11px;color:rgba(255,255,255,0.5)">120 / 800</span>

    <span style="font-family:Inter;font-style:italic;font-size:10px;letter-spacing:0.16em;color:rgba(255,255,255,0.5);text-transform:uppercase">H1</span>
    <span style="font-family:'Aston Martin Flare',Georgia;font-style:normal;font-weight:800;font-size:36px;color:#fff;text-transform:uppercase;line-height:1">Headline</span>
    <span style="font-family:Inter;font-style:italic;font-size:11px;color:rgba(255,255,255,0.5)">48 / 800</span>

    <span style="font-family:Inter;font-style:italic;font-size:10px;letter-spacing:0.16em;color:rgba(255,255,255,0.5);text-transform:uppercase">H2</span>
    <span style="font-family:'Aston Martin Flare',Georgia;font-style:normal;font-weight:700;font-size:28px;color:#fff;text-transform:uppercase;line-height:1">Section title</span>
    <span style="font-family:Inter;font-style:italic;font-size:11px;color:rgba(255,255,255,0.5)">36 / 700</span>

    <span style="font-family:Inter;font-style:italic;font-size:10px;letter-spacing:0.16em;color:rgba(255,255,255,0.5);text-transform:uppercase">H3</span>
    <span style="font-family:'Aston Martin Flare',Georgia;font-style:normal;font-weight:700;font-size:22px;color:#fff;line-height:1.1">Card heading</span>
    <span style="font-family:Inter;font-style:italic;font-size:11px;color:rgba(255,255,255,0.5)">28 / 700</span>

    <span style="font-family:Inter;font-style:italic;font-size:10px;letter-spacing:0.16em;color:rgba(255,255,255,0.5);text-transform:uppercase">Body</span>
    <span style="font-family:'Aston Martin Sans',Inter;font-style:italic;font-weight:300;font-size:16px;color:#fff;line-height:1.5">Body copy in italic Sans</span>
    <span style="font-family:Inter;font-style:italic;font-size:11px;color:rgba(255,255,255,0.5)">16 / 300i</span>

    <span style="font-family:Inter;font-style:italic;font-size:10px;letter-spacing:0.16em;color:rgba(255,255,255,0.5);text-transform:uppercase">Caption</span>
    <span style="font-family:Inter;font-style:italic;font-weight:300;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.7)">23 APR 2026 · SILVERSTONE</span>
    <span style="font-family:Inter;font-style:italic;font-size:11px;color:rgba(255,255,255,0.5)">12 / 300</span>
  </div>
</div>
</body></html>
